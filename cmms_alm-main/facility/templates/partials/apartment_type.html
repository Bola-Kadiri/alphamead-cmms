<div class="apartment-main_body container-fluid px-4" id="apartment-main_body" style="width: 100% !important;">
  <div class="apartment-type card shadow-sm w-100">
      <!-- Header -->

      <!-- Body -->
      <div id="apartment-detail" class="collapse show">
          <div class="card-body">
              <div class="apartment-type_details row mt-3">
                  <!-- Name -->
                  <div class="col-md-6 mb-3">
                      <h5 class="fw-bold text-dark">Name</h5>
                      <p class="text-muted" id="name">{{ apartment_type.name }}</p>
                  </div>

                  <!-- Status -->
                  <div class="col-md-6 mb-3">
                      <h5 class="fw-bold text-dark">Status</h5>
                      <p class="text-muted" id="status">
                          <span class="badge {% if apartment_type.status == 'Active' %} bg-success {% else %} bg-danger {% endif %}">
                              {{ apartment_type.status }}
                          </span>
                      </p>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>
